<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio to QR Code</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Audio to QR Code</h1>
            <p>Record audio and generate QR codes</p>
        </header>

        <main>
            <div class="recording-section">
                <div class="record-controls">
                    <button id="recordBtn" class="record-btn">
                        <span class="record-icon">🎙️</span>
                        <span class="record-text">Start Recording</span>
                    </button>
                    <div class="recording-indicator" id="recordingIndicator">
                        <div class="pulse"></div>
                        <span>Recording...</span>
                    </div>
                </div>
                
                <div class="audio-info" id="audioInfo">
                    <div class="duration">Duration: <span id="duration">0:00</span></div>
                    <div class="data-size">Data size: <span id="dataSize">0 KB</span></div>
                </div>
            </div>

            <div class="audio-preview" id="audioPreview">
                <audio controls id="audioPlayer"></audio>
                <div class="trim-controls" id="trimControls">
                    <label>Trim audio (if data too large):</label>
                    <div class="trim-inputs">
                        <input type="range" id="startTime" min="0" max="100" value="0">
                        <input type="range" id="endTime" min="0" max="100" value="100">
                    </div>
                    <div class="trim-labels">
                        <span>Start: <span id="startLabel">0:00</span></span>
                        <span>End: <span id="endLabel">0:00</span></span>
                    </div>
                    <button id="trimBtn" class="trim-btn">Apply Trim</button>
                </div>
            </div>

            <div class="status" id="status"></div>

            <div class="qr-section" id="qrSection">
                <!-- QR Codes slideshow will be generated here -->
                <div class="slideshow-container">
                    <div class="slides-wrapper">
                        <!-- QR code slides will be injected here -->
                    </div>
                    <a class="prev" id="prevSlideBtn">&#10094;</a>
                    <a class="next" id="nextSlideBtn">&#10095;</a>
                    <div id="slideCounter" class="slide-counter"></div>
                </div>
                <div class="slideshow-controls">
                    <button id="playPauseBtn" class="slideshow-btn">▶️ Rapid Scan</button>
                </div>
            </div>

            <div class="scanner-section" id="scannerSection">
                <h2>Scan QR Code Parts</h2>
                <div id="qr-reader" style="width: 100%; max-width: 500px; margin: 0 auto;"></div>
                <div id="scanStatus" class="status"></div>
                <div id="missingPartsInfo"></div>
                <button id="stopScanBtn" class="record-btn" style="margin-top: 20px; display: none;">Stop Scanning</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
